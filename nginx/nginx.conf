upstream idp_cluster {
    server idp-node-1:8080;
    server idp-node-2:8080;
    server idp-node-3:8080;
}

server {
    listen 80;

    location / {
        proxy_pass http://idp_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SSE events need long-lived connections
    location /api/events/stream {
        proxy_pass http://idp_cluster;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # gRPC traffic
    location /portal. {
        grpc_pass grpc://idp_cluster;
    }
}

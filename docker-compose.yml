services:
  idp-node-1:
    build: .
    environment:
      - NODE_ID=node-1
      - PLUGINS_DIR=/plugins
    volumes:
      - ./plugins:/plugins:ro
    networks:
      - idp

  idp-node-2:
    build: .
    environment:
      - NODE_ID=node-2
      - PLUGINS_DIR=/plugins
    volumes:
      - ./plugins:/plugins:ro
    networks:
      - idp

  idp-node-3:
    build: .
    environment:
      - NODE_ID=node-3
      - PLUGINS_DIR=/plugins
    volumes:
      - ./plugins:/plugins:ro
    networks:
      - idp

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - idp-node-1
      - idp-node-2
      - idp-node-3
    networks:
      - idp

networks:
  idp:

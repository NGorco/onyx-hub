syntax = "proto3";

option csharp_namespace = "Idpai.Grpc";

package portal;

service DataStore {
  rpc Get (GetRequest) returns (GetResponse);
  rpc Set (SetRequest) returns (SetResponse);
  rpc Delete (DeleteRequest) returns (DeleteResponse);
  rpc List (ListRequest) returns (ListResponse);
  rpc Watch (WatchRequest) returns (stream WatchEvent);
}

service Catalog {
  rpc GetApis (GetApisRequest) returns (GetApisResponse);
  rpc RegisterApi (RegisterApiRequest) returns (RegisterApiResponse);
  rpc GetPlugins (GetPluginsRequest) returns (GetPluginsResponse);
}

service Events {
  rpc Publish (PublishRequest) returns (PublishResponse);
  rpc Subscribe (SubscribeRequest) returns (stream EventMessage);
}

// DataStore messages
message GetRequest {
  string scope = 1;
  string key = 2;
}

message GetResponse {
  string value = 1;
  bool found = 2;
}

message SetRequest {
  string scope = 1;
  string key = 2;
  string value = 3;
  int64 ttl_seconds = 4;
}

message SetResponse {
  bool success = 1;
}

message DeleteRequest {
  string scope = 1;
  string key = 2;
}

message DeleteResponse {
  bool deleted = 1;
}

message ListRequest {
  string scope = 1;
  string prefix = 2;
  int32 limit = 3;
}

message ListItem {
  string key = 1;
  string value = 2;
}

message ListResponse {
  repeated ListItem items = 1;
  int32 total = 2;
}

message WatchRequest {
  string scope = 1;
  string prefix = 2;
}

message WatchEvent {
  string event_type = 1;
  string key = 2;
  string value = 3;
}

// Catalog messages
message GetApisRequest {
  string plugin_id = 1;
  repeated string tags = 2;
}

message ApiSpec {
  string id = 1;
  string plugin_id = 2;
  string method = 3;
  string path = 4;
  string description = 5;
  repeated string tags = 6;
  string schema_json = 7;
}

message GetApisResponse {
  repeated ApiSpec apis = 1;
}

message RegisterApiRequest {
  ApiSpec api = 1;
}

message RegisterApiResponse {
  bool success = 1;
}

message GetPluginsRequest {}

message PluginInfo {
  string id = 1;
  string name = 2;
  string version = 3;
  string description = 4;
  bool has_ui = 5;
  bool has_be = 6;
  string status = 7;
}

message GetPluginsResponse {
  repeated PluginInfo plugins = 1;
}

// Events messages
message PublishRequest {
  string topic = 1;
  string payload = 2;
  map<string, string> headers = 3;
}

message PublishResponse {
  string event_id = 1;
}

message SubscribeRequest {
  repeated string topics = 1;
}

message EventMessage {
  string id = 1;
  string topic = 2;
  string payload = 3;
  map<string, string> headers = 4;
  int64 timestamp = 5;
}
